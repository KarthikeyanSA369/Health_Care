<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="title-section">
            <h1>Heart Disease Prediction</h1>
            <p>Please provide the patient's details</p>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto; border-top-color: #e63946;">
            <div class="card-header">
                <h2><span class="card-icon">❤️</span> Patient Vitals</h2>
            </div>
            <form action="/predict_heart" method="post">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="e.g. 45" required>
                </div>
                <div class="form-group">
                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="" disabled selected>Select Sex</option>
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Chest Pain Type (0-3)</label>
                    <input type="number" name="cp" placeholder="0-3" required>
                </div>
                <div class="form-group">
                    <label>Resting Blood Pressure</label>
                    <input type="number" step="any" name="trestbps" placeholder="e.g. 120" required>
                </div>
                <div class="form-group">
                    <label>Cholesterol</label>
                    <input type="number" step="any" name="chol" placeholder="e.g. 200" required>
                </div>
                <div class="form-group">
                    <label>Fasting Blood Sugar > 120 mg/dl</label>
                    <select name="fbs" required>
                        <option value="" disabled selected>Select</option>
                        <option value="1">True</option>
                        <option value="0">False</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Resting ECG Results (0-2)</label>
                    <input type="number" name="restecg" placeholder="0, 1, or 2" required>
                </div>
                <div class="form-group">
                    <label>Max Heart Rate Achieved</label>
                    <input type="number" step="any" name="thalach" placeholder="e.g. 150" required>
                </div>
                <div class="form-group">
                    <label>Exercise Induced Angina</label>
                    <select name="exang" required>
                        <option value="" disabled selected>Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Oldpeak</label>
                    <input type="number" step="any" name="oldpeak" placeholder="e.g. 1.0" required>
                </div>
                <div class="form-group">
                    <label>Slope (0-2)</label>
                    <input type="number" name="slope" placeholder="0, 1, or 2" required>
                </div>
                <div class="form-group">
                    <label>Number of Major Vessels (0-3)</label>
                    <input type="number" name="ca" placeholder="0-3" required>
                </div>
                <div class="form-group">
                    <label>Thalassemia (1-3)</label>
                    <input type="number" name="thal" placeholder="1, 2, or 3" required>
                </div>
                <button type="submit" class="btn-submit" style="background-color: #e63946;">Predict Disease</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/" class="btn-home">Back to Home</a>
        </div>
    </div>

</body>

</html>
