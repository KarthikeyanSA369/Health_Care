<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obesity Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="title-section">
            <h1>Obesity Prediction</h1>
            <p>Assess lifestyle impacts on health</p>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto; border-top-color: var(--secondary-color);">
            <div class="card-header">
                <h2><span class="card-icon">⚖️</span> Lifestyle Factors</h2>
            </div>
            <form action="/predict_obesity" method="post">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="Age" placeholder="e.g. 25" required>
                </div>
                <div class="form-group">
                    <label>Height (m)</label>
                    <input type="number" step="any" name="Height" placeholder="e.g. 1.75">
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" step="any" name="Weight" placeholder="e.g. 70">
                </div>
                <div class="form-group">
                    <label>Vegetable Consumption (1-3)</label>
                    <input type="number" step="any" name="FCVC" placeholder="1 = Never, 3 = Always" required>
                </div>
                <div class="form-group">
                    <label>Meals Per Day (1-4)</label>
                    <input type="number" step="any" name="NCP" placeholder="1 to 4" required>
                </div>
                <div class="form-group">
                    <label>Water Intake (1-3 Liters)</label>
                    <input type="number" step="any" name="CH2O" placeholder="1 to 3" required>
                </div>
                <div class="form-group">
                    <label>Physical Activity (0-3)</label>
                    <input type="number" step="any" name="FAF" placeholder="0 = None, 3 = High" required>
                </div>
                <div class="form-group">
                    <label>Technology Use (0-2 Hours)</label>
                    <input type="number" step="any" name="TUE" placeholder="0 to 2" required>
                </div>
                <button type="submit" class="btn-submit" style="background-color: var(--secondary-color);">Predict
                    Obesity</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/" class="btn-home">Back to Home</a>
        </div>
    </div>

</body>

</html>
