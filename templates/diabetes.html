<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="title-section">
            <h1>Diabetes Prediction</h1>
            <p>Enter your health metrics below</p>
        </div>

        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header">
                <h2><span class="card-icon">🩸</span> Clinical Data</h2>
            </div>
            <form action="/predict_diabetes" method="post">
                <div class="form-group">
                    <label>Pregnancies</label>
                    <input type="number" name="Pregnancies" placeholder="e.g. 0" required>
                </div>
                <div class="form-group">
                    <label>Glucose Level</label>
                    <input type="number" step="any" name="Glucose" placeholder="e.g. 120" required>
                </div>
                <div class="form-group">
                    <label>Blood Pressure</label>
                    <input type="number" step="any" name="BloodPressure" placeholder="e.g. 80" required>
                </div>
                <div class="form-group">
                    <label>Skin Thickness</label>
                    <input type="number" step="any" name="SkinThickness" placeholder="e.g. 20" required>
                </div>
                <div class="form-group">
                    <label>Insulin Level</label>
                    <input type="number" step="any" name="Insulin" placeholder="e.g. 80" required>
                </div>
                <div class="form-group">
                    <label>BMI</label>
                    <input type="number" step="any" name="BMI" placeholder="e.g. 25.5" required>
                </div>
                <div class="form-group">
                    <label>Diabetes Pedigree Function</label>
                    <input type="number" step="any" name="DiabetesPedigreeFunction" placeholder="e.g. 0.5" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="Age" placeholder="e.g. 30" required>
                </div>
                <button type="submit" class="btn-submit">Predict Result</button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/" class="btn-home">Back to Home</a>
        </div>
    </div>

</body>

</html>
